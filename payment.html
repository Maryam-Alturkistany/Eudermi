<html>
<head>
  <link rel="stylesheet" href="paymentcss.css">
  <link rel="icon" type="image/x-icon" href="favicon-16x16.png">
    <title>| Payment</title>
</head>   
<body>
<div class="row">
  <div class="col-75">
    <div class="container">
      <form action="Payment.php" onsubmit="return validateForm()" method="post">
        <div class="row">
          <div class="col-50">

            <h3>Billing Address</h3>

            <label for="Country"><i class="fa fa-address-card-o"></i> Country</label>
            <input type="text" id="Country" name="Country" placeholder="Saudi Arabia" required>

            <label for="city"><i class="fa fa-institution"></i> City</label>
            <input type="text" id="city" name="City" placeholder="Jeddah" required>

            <label for="District">District</label>
            <input type="text" id="District" name="District" placeholder="Alrihely" required>

            <label for="Street">Street</label>
            <input type="text" id="Street" name="Street" placeholder="14" required>

            <h3>Payment</h3>

            <label for="fname">Accepted Cards</label>
            <div class="icon-container">
              <i class="fa fa-cc-visa" style="color:navy;"></i>
              <img src="applepay.png" alt="Apple Pay" style="width: 127px; height: 99px;">
              <i class="fa fa-cc-amex" style="color:blue;"></i>
              <img src="visa.png" alt="Visa" style="width: 140px; height: 90px;">
              <i class="fa fa-cc-mastercard" style="color:red;"></i>
              <img src="paypal.png" alt="PayPal" style="width: 87px; height: 87px;">
              <i class="fa fa-cc-discover" style="color:orange;"></i>
              <img src="mastercard.png" alt="Mastercard" style="width: 145px; height: 87px;">
            </div>

            <label for="ccnum">Credit card number</label>
            <input type="text" id="ccnum" name="cardnumber" placeholder="1111-2222-3333-4444" required>

            <label for="expdate">Exp DATE</label>
            <input type="text" id="expdate" name="expdate" placeholder="00/00" required>

            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="000" required>

            <input name="checkout" type="submit" value="Checkout" class="btn">

          </div>
        </div>
      </form>
     <input class="btn" value="Back to Cart" type="submit" name="Cart">
    </div>
  </div>
</div>

<script>
function validateForm(){ 


        var inputs = document.getElementsByTagName('input');
        for (var i = 0; i < inputs.length; i++) {
            if (inputs[i].hasAttribute('required') && inputs[i].value === '') {
                alert("Please fill in all the fields.");
                return false;
            }
        }

        var ccnumInput = document.getElementById('ccnum');
        var ccnumValue = ccnumInput.value.replace(/-/g, ''); // Remove dashes from the input

        if (!/^[0-9]{16}$/.test(ccnumValue)) {
            alert("Invalid credit card number. Please enter a 16-digit number without dashes.");
            return false;
        }

        var cvvInput = document.getElementById('cvv');
        var cvvValue = cvvInput.value;

        if (!/^[0-9]{3}$/.test(cvvValue)) {
            alert("Invalid CVV. Please enter a 3-digit number.");
            return false;
        }

        var expdateInput = document.getElementById('expdate');
        var expdateValue = expdateInput.value;

        if (!/^(0[1-9]|1[0-2])\/[0-9]{2}$/.test(expdateValue)) {
            alert("Invalid expiration date. Please enter a valid date in the format MM/YY.");
            return false;
        }

        return true;
}


function goToCartPage() {
  window.location.href = "Order.html";
}


function goToHomePage() {
  if (validateForm()) {

    alert("Payment completed successfully!!");

    setTimeout(function() {
      window.location.href = "HomePage.html";
    }, 0);

  }
}
</script>

</body>
</html>
